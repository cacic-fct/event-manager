name: event-manager

services:
  events-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - /media/zfs-docker/cacic-eventos/db:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default

  events-redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - /media/zfs-docker/cacic-eventos/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default

  events-backend-migrate:
    image: ghcr.io/cacic-fct/event-manager/events-backend:${IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@events-db:5432/postgres}
    command:
      - sh
      - -c
      - cd /app/apps/events-backend && ../../node_modules/.bin/prisma migrate deploy --config prisma.config.ts
    depends_on:
      events-db:
        condition: service_healthy
    restart: 'no'
    networks:
      - default

  events-backend:
    image: ghcr.io/cacic-fct/event-manager/events-backend:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@events-db:5432/postgres}
      REDIS_URL: ${REDIS_URL:-redis://events-redis:6379}
      KEYCLOAK_REALM_URL: ${KEYCLOAK_REALM_URL:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI:-}
      KEYCLOAK_POST_LOGIN_REDIRECT_URI: ${KEYCLOAK_POST_LOGIN_REDIRECT_URI:-}
      KEYCLOAK_POST_LOGOUT_REDIRECT_URI: ${KEYCLOAK_POST_LOGOUT_REDIRECT_URI:-}
      TYPESENSE_ENABLED: ${TYPESENSE_ENABLED:-false}
      TYPESENSE_HOST: ${TYPESENSE_HOST:-}
      TYPESENSE_PORT: ${TYPESENSE_PORT:-}
      TYPESENSE_PROTOCOL: ${TYPESENSE_PROTOCOL:-}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-}
    depends_on:
      events-db:
        condition: service_healthy
      events-redis:
        condition: service_healthy
      events-backend-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - 'traefik.enable=true'
      - 'traefik.scope=public'
      - 'traefik.docker.network=traefik'
      - 'traefik.http.routers.event-manager-api.entrypoints=web,websecure'
      - 'traefik.http.routers.event-manager-api.rule=Host(`eventos.cacic.dev.br`) && PathPrefix(`/api`)'
      - 'traefik.http.routers.event-manager-api.tls=true'
      - 'traefik.http.routers.event-manager-api.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.event-manager-api.service=event-manager-api-svc'
      - 'traefik.http.services.event-manager-api-svc.loadbalancer.server.port=3000'
      - 'diun.enable=true'
    networks:
      - default
      - traefik

  cacic-eventos:
    image: ghcr.io/cacic-fct/event-manager/cacic-eventos:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 4000
    depends_on:
      events-backend:
        condition: service_started
    restart: unless-stopped
    labels:
      - 'traefik.enable=true'
      - 'traefik.scope=public'
      - 'traefik.docker.network=traefik'
      - 'traefik.http.routers.event-manager-admin.entrypoints=web,websecure'
      - 'traefik.http.routers.event-manager-admin.rule=Host(`eventos.cacic.dev.br`) && PathPrefix(`/admin/`)'
      - 'traefik.http.routers.event-manager-admin.tls=true'
      - 'traefik.http.routers.event-manager-admin.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.event-manager-admin.service=event-manager-admin-svc'
      - 'traefik.http.services.event-manager-admin-svc.loadbalancer.server.port=4000'

      - 'traefik.http.routers.event-manager-admin-noslash.entrypoints=web,websecure'
      - 'traefik.http.routers.event-manager-admin-noslash.rule=Host(`eventos.cacic.dev.br`) && Path(`/admin`)'
      - 'traefik.http.routers.event-manager-admin-noslash.tls=true'
      - 'traefik.http.routers.event-manager-admin-noslash.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.event-manager-admin-noslash.middlewares=event-manager-admin-slash'
      - 'traefik.http.middlewares.event-manager-admin-slash.redirectregex.regex=^https?://([^/]+)/admin$$'
      - 'traefik.http.middlewares.event-manager-admin-slash.redirectregex.replacement=https://$${1}/admin/'
      - 'traefik.http.middlewares.event-manager-admin-slash.redirectregex.permanent=true'
    networks:
      - default
      - traefik

  public:
    image: ghcr.io/cacic-fct/event-manager/public:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 4000
    depends_on:
      events-backend:
        condition: service_started
    restart: unless-stopped
    labels:
      - 'traefik.enable=true'
      - 'traefik.scope=public'
      - 'traefik.docker.network=traefik'
      - 'traefik.http.routers.event-manager-public.entrypoints=web,websecure'
      - 'traefik.http.routers.event-manager-public.rule=Host(`eventos.cacic.dev.br`) && PathPrefix(`/app/`)'
      - 'traefik.http.routers.event-manager-public.tls=true'
      - 'traefik.http.routers.event-manager-public.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.event-manager-public.service=event-manager-public-svc'
      - 'traefik.http.services.event-manager-public-svc.loadbalancer.server.port=4000'

      - 'traefik.http.routers.event-manager-root.entrypoints=web,websecure'
      - 'traefik.http.routers.event-manager-root.rule=Host(`eventos.cacic.dev.br`) && Path(`/`)'
      - 'traefik.http.routers.event-manager-root.tls=true'
      - 'traefik.http.routers.event-manager-root.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.event-manager-root.middlewares=event-manager-root-redirect'
      - 'traefik.http.middlewares.event-manager-root-redirect.redirectregex.regex=^https?://([^/]+)/$$'
      - 'traefik.http.middlewares.event-manager-root-redirect.redirectregex.replacement=https://$${1}/app/'
      - 'traefik.http.middlewares.event-manager-root-redirect.redirectregex.permanent=true'

      - 'traefik.http.routers.event-manager-public-noslash.entrypoints=web,websecure'
      - 'traefik.http.routers.event-manager-public-noslash.rule=Host(`eventos.cacic.dev.br`) && Path(`/app`)'
      - 'traefik.http.routers.event-manager-public-noslash.tls=true'
      - 'traefik.http.routers.event-manager-public-noslash.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.event-manager-public-noslash.middlewares=event-manager-public-slash'
      - 'traefik.http.middlewares.event-manager-public-slash.redirectregex.regex=^https?://([^/]+)/app$$'
      - 'traefik.http.middlewares.event-manager-public-slash.redirectregex.replacement=https://$${1}/app/'
      - 'traefik.http.middlewares.event-manager-public-slash.redirectregex.permanent=true'

      # Redirect /robots.txt, /humans.txt and /.well-known/security.txt to /app/*.txt
      - 'traefik.http.routers.event-manager-public-textfiles.entrypoints=web,websecure'
      - 'traefik.http.routers.event-manager-public-textfiles.rule=Host(`eventos.cacic.dev.br`) && (Path(`/robots.txt`) || Path(`/humans.txt`) || Path(`/.well-known/security.txt`))'
      - 'traefik.http.routers.event-manager-public-textfiles.tls=true'
      - 'traefik.http.routers.event-manager-public-textfiles.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.event-manager-public-textfiles.middlewares=event-manager-public-textfiles-redirect'
      - 'traefik.http.middlewares.event-manager-public-textfiles-redirect.redirectregex.regex=^https?://([^/]+)(/.*)$$'
      - 'traefik.http.middlewares.event-manager-public-textfiles-redirect.redirectregex.replacement=https://$${1}/app$${2}'
      - 'traefik.http.middlewares.event-manager-public-textfiles-redirect.redirectregex.permanent=true'

      # Redirect /validar/* to /app/validate/*
      - 'traefik.http.routers.event-manager-validar.entrypoints=web,websecure'
      - 'traefik.http.routers.event-manager-validar.rule=Host(`eventos.cacic.dev.br`) && PathPrefix(`/validar/`)'
      - 'traefik.http.routers.event-manager-validar.tls=true'
      - 'traefik.http.routers.event-manager-validar.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.event-manager-validar.middlewares=event-manager-validar-redirect'
      - 'traefik.http.middlewares.event-manager-validar-redirect.redirectregex.regex=^https?://([^/]+)/validar/(.*)$$'
      - 'traefik.http.middlewares.event-manager-validar-redirect.redirectregex.replacement=https://$${1}/app/validate/$${2}'
      - 'traefik.http.middlewares.event-manager-validar-redirect.redirectregex.permanent=true'
      - 'traefik.http.routers.event-manager-validar.service=event-manager-public-svc'
    networks:
      - default
      - traefik

networks:
  traefik:
    external: true

<section class="section attendance-shell">
  <mat-tab-group
    animationDuration="160ms"
    mat-stretch-tabs="false"
    [selectedIndex]="selectedTabIndex()"
    (selectedIndexChange)="onSelectedTabIndexChange($event)">
    <mat-tab label="Por evento">
      <app-workspace-event-attendances-subtab />
    </mat-tab>
    <mat-tab label="Por grande evento">
      <app-workspace-major-event-attendances-subtab />
    </mat-tab>
  </mat-tab-group>
</section>

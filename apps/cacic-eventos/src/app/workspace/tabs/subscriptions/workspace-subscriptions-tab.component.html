<section class="workspace-tab">
  @if (permissions.has('validate-receipt:read')) {
  <div class="subscription-actions">
    <a matButton="filled" routerLink="/subscriptions/validate-receipts">
      <mat-icon>receipt_long</mat-icon>
      Validar comprovantes ({{ pendingReceiptsCount() }})
    </a>
  </div>
  }

  <mat-tab-group [selectedIndex]="selectedTabIndex()" (selectedIndexChange)="onSelectedTabIndexChange($event)">
    <mat-tab label="Eventos">
      <app-workspace-event-subscriptions-subtab />
    </mat-tab>
    <mat-tab label="Grandes eventos">
      <app-workspace-major-event-subscriptions-subtab />
    </mat-tab>
  </mat-tab-group>
</section>

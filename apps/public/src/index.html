<!doctype html>
<html lang="pt-br">
  <head>
    <!-- Technical information -->
    <base href="/" />
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />

    <title>CACiC Eventos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/app/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/app/icons/favicon.svg" />
    <link rel="shortcut icon" href="/app/icons/favicon.ico" />

    <!-- User profile pictures -->
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />
    <!-- Turnstile -->
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />
    <!-- 
      Emojis 
      Service Worker caches emojis aggressively, therefore no need to preconnect.
    -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- CACiC Services -->
    <link rel="preconnect" href="https://a.cacic.dev.br" crossorigin />
    <link rel="preconnect" href="https://unleash.cacic.dev.br" crossorigin />

    <!-- Disable zoom -->
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Don't highlight phone numbers automatically -->
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO -->
    <meta name="description" content="Calendário de eventos dos alunos da FCT-Unesp" />
    <meta
      name="keywords"
      content="Calendário de eventos, FCT-Unesp, Unesp Presidente Prudente, Faculdade de Ciência e Tecnologia, Universidade Estadual Paulista Júlio de Mesquita Filho, CACiC, Centro Acadêmico de Ciência da Computação" />

    <!-- OGP -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CACiC Eventos" />
    <meta property="og:description" content="Calendário de eventos dos estudantes da FCT-Unesp." />
    <meta property="og:image" content="https://eventos.cacic.dev.br/app/icons/ogp.png" />

    <!-- PWA  -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="CACiC Eventos" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#009ee2" />
  </head>
  <body>
    <app-root></app-root>
    <noscript>
      Enable JavaScript to use this application.
      <br />
      Habilite o JavaScript para usar esta aplicação.
    </noscript>
  </body>
</html>

<mat-toolbar>
  <a matIconButton routerLink="/dev-tools" aria-label="Voltar para o menu">
    <mat-icon>arrow_back</mat-icon>
  </a>
  <span>Dev tools</span>
</mat-toolbar>

<button mat-button (click)="scanCode()">
  <mat-icon>qr_code_scanner</mat-icon>
  Abrir scanner
</button>
<h1>Resultado:</h1>
{{ scannedCode() }}

<hr />
<h1>Feedback visual e sonoro</h1>
<button mat-button (click)="showFeedback('valid')">Valid</button>
<button mat-button (click)="showFeedback('invalid')">Invalid</button>
<button mat-button (click)="showFeedback('duplicate')">Duplicate</button>
<button mat-button (click)="showFeedback('nonPaying')">Non-paying</button>
<button mat-button (click)="showFeedback('nonSubscribed')">Non-subscribed</button>

<mat-toolbar>
  <a matIconButton routerLink="/menu" aria-label="Voltar para o menu">
    <mat-icon>arrow_back</mat-icon>
  </a>
  <span>Crachá</span>
  <span class="global-toolbar-spacer"></span>
  <button matIconButton aria-label="Imprimir crachá" (click)="print()">
    <mat-icon>printer</mat-icon>
  </button>
  @if (serviceWorkerService.hasServiceWorker()) {
  <button matIconButton aria-label="Disponível off-line" (click)="availableOffline()">
    <mat-icon>cloud_done</mat-icon>
  </button>
  } @else {
  <button matIconButton aria-label="Não está disponível off-line" (click)="availableOffline()">
    <mat-icon>cloud_off</mat-icon>
  </button>
  }
</mat-toolbar>

<main class="global-container">
  @let user = cardUser();
  <mat-card>
    <mat-card-header>
      <div class="example-header-image">
        <img
          [src]="user?.picture || 'https://placehold.co/40x40'"
          alt="Avatar"
          class="avatar"
          referrerpolicy="no-referrer" />
      </div>
      <h1>{{ user?.name || 'Desconhecido' }}</h1>
      <h2>{{ roleLine(user?.unespRole) }}</h2>
    </mat-card-header>

    <!-- eslint-disable-next-line @angular-eslint/template/alt-text -->
    <object
      alt="Código de barras"
      class="aztec-code margin-horizontal-auto barcode-screen"
      [innerHTML]="profileBarcode() | safe: 'html'"></object>

    <!-- eslint-disable-next-line @angular-eslint/template/alt-text -->
    <object
      alt="Código de barras para impressão"
      class="aztec-code margin-horizontal-auto barcode-print"
      aria-hidden="true"
      [innerHTML]="printProfileBarcode() | safe: 'html'"></object>

    <h3 class="margin-horizontal-auto identity-document">{{ formatDocument(user?.identityDocument || '') }}</h3>
  </mat-card>
</main>

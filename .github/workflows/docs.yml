name: docs

on:
  push:
    paths:
      - 'docs/**'
      - 'apps/backend/prisma/schema/**'
      - 'apps/backend/prisma.config.ts'
      - '.github/workflows/docs.yml'
    branches:
      - '**'

  pull_request:
    paths:
      - 'docs/**'
      - 'apps/backend/prisma/schema/**'
      - 'apps/backend/prisma.config.ts'
      - '.github/workflows/docs.yml'
    branches:
      - '**'

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pull-request-build:
    name: Build docs without generated schema
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install docs dependencies
        working-directory: ./docs
        run: bun install --frozen-lockfile

      - name: Build docs without regenerating database diagram
        working-directory: ./docs
        run: bun run build

  build:
    name: Build docs with generated schema
    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install docs dependencies
        working-directory: ./docs
        run: bun install --frozen-lockfile

      - name: Build for production with generated database diagram
        working-directory: ./docs
        run: bun run build:with-database-diagram

      - name: Upload artifacts

        uses: actions/upload-artifact@v7
        with:
          name: Docs-artifacts
          path: docs/build/
          if-no-files-found: error

  deploy:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: Docs-artifacts
          path: docs/build/

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.DOCS_CLOUDFLARE_API_TOKEN }}
          accountId: 034f5089bb082eb57cefc432b42b984d
          workingDirectory: 'docs'
          command: pages deploy build --project-name=fct-app-docs --commit-dirty=true

      - name: Create GitHub Deployment
        uses: actions/github-script@v9
        with:
          script: |
            const ref = context.payload.ref || context.ref;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: ref,
              required_contexts: [],
              environment: 'fct-app-docs (production)',
              description: 'fct-app-docs',
              auto_merge: false,
              production_environment: true,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: 'https://docs.fctapp.cacic.dev.br',
            });

  scrape:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Algolia Crawler creation and crawl
        uses: algolia/algoliasearch-crawler-github-actions@v1.1.13
        id: algolia_crawler
        with:
          crawler-user-id: ${{ secrets.DOCS_ALGOLIA_CRAWLER_USER_ID }}
          crawler-api-key: ${{ secrets.DOCS_ALGOLIA_CRAWLER_API_KEY }}
          algolia-app-id: ${{ secrets.DOCS_ALGOLIA_APP_ID }}
          algolia-api-key: ${{ secrets.DOCS_ALGOLIA_API_KEY }}
          site-url: 'https://docs.fctapp.cacic.dev.br'
          crawler-name: 'fctapp-yudi'

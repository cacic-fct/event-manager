name: Publish packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - event-manager-m2m-contracts
          - event-manager-public-contracts

  push:
    branches:
      - main
    paths:
      - 'libs/event-manager-m2m-contracts/**'
      - 'libs/event-manager-public-contracts/**'
      - 'package.json'
      - 'bun.lock'
      - 'bun.lockb'
      - 'nx.json'
      - 'tsconfig.base.json'
      - '.npmrc'
      - '.github/workflows/publish-packages.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    if: >
      github.event_name != 'pull_request' &&
      github.event_name != 'pull_request_target' &&
      github.repository_owner == 'cacic-fct' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/dev'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Detect changed packages
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          event_manager_m2m_contracts=false
          event_manager_public_contracts=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.package }}" in
              all)
                event_manager_m2m_contracts=true
                event_manager_public_contracts=true
                ;;
              event-manager-m2m-contracts)
                event_manager_m2m_contracts=true
                ;;
              event-manager-public-contracts)
                event_manager_public_contracts=true
                ;;
            esac
          else
            base="${{ github.event.before }}"

            if ! git rev-parse --verify "${base}^{commit}" >/dev/null 2>&1; then
              base="$(git rev-list --max-parents=0 HEAD)"
            fi

            changed_files="$(git diff --name-only "${base}" "${{ github.sha }}")"

            if grep -q '^libs/event-manager-m2m-contracts/' <<< "${changed_files}"; then
              event_manager_m2m_contracts=true
            fi

            if grep -q '^libs/event-manager-public-contracts/' <<< "${changed_files}"; then
              event_manager_public_contracts=true
            fi
          fi

          any_changed=false

          if [[ "${event_manager_m2m_contracts}" == "true" ]]; then
            any_changed=true
          fi

          if [[ "${event_manager_public_contracts}" == "true" ]]; then
            any_changed=true
          fi

          {
            echo "event_manager_m2m_contracts=${event_manager_m2m_contracts}"
            echo "event_manager_public_contracts=${event_manager_public_contracts}"
            echo "any_changed=${any_changed}"
          } >> "${GITHUB_OUTPUT}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.any_changed == 'true'
        with:
          registries: |
            https://registry.npmjs.org/
            @cacic-fct:https://npm.pkg.github.com/|$NPM_CONFIG_TOKEN

      - name: Install dependencies
        if: steps.changes.outputs.any_changed == 'true'
        run: bun install --frozen-lockfile
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build Event Manager M2M contracts
        if: steps.changes.outputs.event_manager_m2m_contracts == 'true'
        run: bunx nx build event-manager-m2m-contracts

      - name: Build Event Manager public contracts
        if: steps.changes.outputs.event_manager_public_contracts == 'true'
        run: bunx nx build event-manager-public-contracts

      - name: Publish Event Manager M2M contracts
        if: steps.changes.outputs.event_manager_m2m_contracts == 'true'
        working-directory: dist/libs/event-manager-m2m-contracts
        shell: bash
        run: |
          set -euo pipefail

          node - <<'NODE'
          const fs = require('node:fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

          if (!pkg.name || !pkg.name.startsWith('@cacic-fct/')) {
            throw new Error(`Package name must be scoped for GitHub Packages. Found: ${pkg.name}`);
          }

          if (!pkg.version) {
            throw new Error('Package version is required.');
          }
          NODE

          bun publish --registry https://npm.pkg.github.com --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Event Manager public contracts
        if: steps.changes.outputs.event_manager_public_contracts == 'true'
        working-directory: dist/libs/event-manager-public-contracts
        shell: bash
        run: |
          set -euo pipefail

          node - <<'NODE'
          const fs = require('node:fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

          if (!pkg.name || !pkg.name.startsWith('@cacic-fct/')) {
            throw new Error(`Package name must be scoped for GitHub Packages. Found: ${pkg.name}`);
          }

          if (!pkg.version) {
            throw new Error('Package version is required.');
          }
          NODE

          bun publish --registry https://npm.pkg.github.com --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

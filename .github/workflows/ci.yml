name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fct_app_test
  REDIS_URL: redis://localhost:6379

jobs:
  lint:
    name: Lint all projects
    runs-on: ubuntu-latest

    permissions:
      contents: read

    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Lint all projects
        run: bunx nx run-many -t lint --all --parallel=3

  unit-tests:
    name: Unit tests (${{ matrix.project }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: fct_app_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fct_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        project:
          - admin
          - backend
          - offline-public-data-access
          - public
          - shared-utils

    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Run unit tests with coverage
        run: bunx nx test ${{ matrix.project }}

      - name: Collect coverage reports
        id: coverage
        shell: bash
        run: |
          if [ ! -d coverage ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t reports < <(find coverage -type f \( -name 'lcov.info' -o -name 'coverage-final.json' -o -name 'coverage.xml' -o -name 'clover.xml' \) | sort)

          if [ "${#reports[@]}" -eq 0 ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          reports_csv="$(IFS=,; echo "${reports[*]}")"
          echo "has_reports=true" >> "$GITHUB_OUTPUT"
          echo "files=$reports_csv" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov
        if: steps.coverage.outputs.has_reports == 'true'
        uses: codecov/codecov-action@v6
        with:
          flags: unit-${{ matrix.project }}
          files: ${{ steps.coverage.outputs.files }}
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend-e2e:
    name: Frontend E2E (${{ matrix.project }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        project:
          - admin-e2e
          - public-e2e

    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run frontend e2e tests
        run: E2E_START_SERVER=true bunx nx e2e ${{ matrix.project }} -- --project=chromium

  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: fct_app_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fct_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read

    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Apply database migrations
        run: bunx prisma migrate deploy --config apps/backend/prisma.config.ts

      - name: Run backend auth e2e tests
        shell: bash
        run: |
          set -euo pipefail

          bunx nx serve backend > /tmp/fct-app-backend.log 2>&1 &
          backend_pid="$!"

          cleanup() {
            kill "$backend_pid" 2>/dev/null || true
            wait "$backend_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          if ! bunx nx e2e backend-e2e --runInBand --coverage; then
            cat /tmp/fct-app-backend.log
            exit 1
          fi

      - name: Collect backend e2e coverage reports
        id: coverage
        shell: bash
        run: |
          if [ ! -d coverage/backend-e2e ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t reports < <(find coverage/backend-e2e -type f \( -name 'lcov.info' -o -name 'coverage-final.json' -o -name 'coverage.xml' -o -name 'clover.xml' \) | sort)

          if [ "${#reports[@]}" -eq 0 ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          reports_csv="$(IFS=,; echo "${reports[*]}")"
          echo "has_reports=true" >> "$GITHUB_OUTPUT"
          echo "files=$reports_csv" >> "$GITHUB_OUTPUT"

      - name: Upload backend e2e coverage to Codecov
        if: steps.coverage.outputs.has_reports == 'true'
        uses: codecov/codecov-action@v6
        with:
          flags: e2e-backend
          files: ${{ steps.coverage.outputs.files }}
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    name: Build deployable apps
    runs-on: ubuntu-latest

    permissions:
      contents: read

    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Build deployable apps
        run: bunx nx run-many -t build -p admin,backend,public --configuration=production --parallel=3

  checks:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    needs:
      - lint
      - unit-tests
      - frontend-e2e
      - backend-e2e
      - build

    permissions:
      contents: read

    if: >
      always() &&
      (
        github.event_name == 'push' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )

    steps:
      - name: Check parallel job results
        shell: bash
        run: |
          if [ '${{ needs.lint.result }}' != 'success' ] ||
            [ '${{ needs.unit-tests.result }}' != 'success' ] ||
            [ '${{ needs.frontend-e2e.result }}' != 'success' ] ||
            [ '${{ needs.backend-e2e.result }}' != 'success' ] ||
            [ '${{ needs.build.result }}' != 'success' ]; then
            echo "::error::One or more CI jobs failed."
            exit 1
          fi

  prepare-untrusted-pr:
    name: Prepare untrusted PR dependencies
    runs-on: ubuntu-latest

    permissions:
      contents: read

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect sensitive file changes
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"

          echo "$changed_files"

          if echo "$changed_files" | grep -E '(^\.github/workflows/.*\.ya?ml$|(^|/)(package\.json|bun\.lock|bun\.lockb|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|\.npmrc|bunfig\.toml)$|^apps/backend/prisma/|^apps/backend/prisma\.config\.ts$)'; then
            echo "::error::Fork PR changed CI/CD, dependency, lockfile, package-auth, or Prisma files."
            echo "::error::A maintainer must review this and run full CI from a trusted branch."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies without lifecycle scripts
        run: bun install --frozen-lockfile --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml
          rm -f bunfig.toml
          rm -f .npmrc

      - name: Upload prepared dependencies
        uses: actions/upload-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: |
            node_modules
            apps/**/node_modules
            libs/**/node_modules
          retention-days: 1
          include-hidden-files: false

  untrusted-pr-lint:
    name: Untrusted PR lint
    runs-on: ubuntu-latest

    needs:
      - prepare-untrusted-pr

    permissions:
      contents: read

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download prepared dependencies
        uses: actions/download-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: .

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Lint all projects
        run: bunx nx run-many -t lint --all --parallel=3

  untrusted-pr-unit-tests:
    name: Untrusted PR unit tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: fct_app_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fct_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    needs:
      - prepare-untrusted-pr

    permissions:
      contents: read

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download prepared dependencies
        uses: actions/download-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: .

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Run unit tests with coverage
        run: bunx nx run-many -t test -p admin,backend,offline-public-data-access,public,shared-utils --parallel=3 --coverage

  untrusted-pr-frontend-e2e:
    name: Untrusted PR frontend E2E (${{ matrix.project }})
    runs-on: ubuntu-latest

    needs:
      - prepare-untrusted-pr

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        project:
          - admin-e2e
          - public-e2e

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download prepared dependencies
        uses: actions/download-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: .

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run frontend e2e tests
        run: E2E_START_SERVER=true bunx nx e2e ${{ matrix.project }} -- --project=chromium

  untrusted-pr-backend-e2e:
    name: Untrusted PR backend E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: fct_app_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fct_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    needs:
      - prepare-untrusted-pr

    permissions:
      contents: read

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download prepared dependencies
        uses: actions/download-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: .

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Apply database migrations
        run: bunx prisma migrate deploy --config apps/backend/prisma.config.ts

      - name: Run backend auth e2e tests
        shell: bash
        run: |
          set -euo pipefail

          bunx nx serve backend > /tmp/fct-app-backend.log 2>&1 &
          backend_pid="$!"

          cleanup() {
            kill "$backend_pid" 2>/dev/null || true
            wait "$backend_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          if ! bunx nx e2e backend-e2e --runInBand; then
            cat /tmp/fct-app-backend.log
            exit 1
          fi

  untrusted-pr-build:
    name: Untrusted PR build
    runs-on: ubuntu-latest

    needs:
      - prepare-untrusted-pr

    permissions:
      contents: read

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download prepared dependencies
        uses: actions/download-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: .

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema

      - name: Build deployable apps
        run: bunx nx run-many -t build -p admin,backend,public --configuration=production --parallel=3

  untrusted-pr-checks:
    name: Untrusted PR checks
    runs-on: ubuntu-latest

    needs:
      - untrusted-pr-lint
      - untrusted-pr-unit-tests
      - untrusted-pr-frontend-e2e
      - untrusted-pr-backend-e2e
      - untrusted-pr-build

    permissions:
      contents: read

    if: >
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Check parallel job results
        shell: bash
        run: |
          if [ '${{ needs.untrusted-pr-lint.result }}' != 'success' ] ||
            [ '${{ needs.untrusted-pr-unit-tests.result }}' != 'success' ] ||
            [ '${{ needs.untrusted-pr-frontend-e2e.result }}' != 'success' ] ||
            [ '${{ needs.untrusted-pr-backend-e2e.result }}' != 'success' ] ||
            [ '${{ needs.untrusted-pr-build.result }}' != 'success' ]; then
            echo "::error::One or more untrusted PR CI jobs failed."
            exit 1
          fi
